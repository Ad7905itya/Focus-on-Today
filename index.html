<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus on Today</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>
    <header>
        <h1 class="heading"><span>Focus on </span>Today</h1>
    </header>
    <main class="container">

        <section class="content-header"><span>Today</span>
            <figcaption>
                <img src="images/Face.svg" alt="Face" id="face">
                <img src="images/Vector.svg" alt="Sun" id="sun">
            </figcaption>
        </section>
        <p class="description desc-value">Raise the bar by completing your goals!</p>
        <div class="Progress-bar">
            <div class="progress-value"><span>2/3 Completed</span></div>
            <p class="description error"></p>
        </div>

        <section class="add-task-section">
            <div class="add-task">
                <div class="circle"></div>
                <input type="text" name="Task-1" id="task_1" placeholder="Add new goal... ">
            </div>
            <div class="add-task">
                <div class="circle"></div>
                <input type="text" name="Task-2" id="task_2" placeholder="Add new goal... ">
            </div>
            <div class="add-task">
                <div class="circle"></div>
                <input type="text" name="Task-3" id="task_3" placeholder="Add new goal... ">
            </div>
        </section>
        <p class="statement">“Move one step ahead, today!”</p>
        <p class="description footer">Made with ❤️ by Aditya Singh</p>
    </main>
</body>

</html>
